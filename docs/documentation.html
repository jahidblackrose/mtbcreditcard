        <section id="overview">
            <h1>System Overview</h1>
            <p>The MTB Credit Card Application System is a modern, banking-grade web application designed for processing credit card applications. It supports both self-service applications and RM-assisted applications.</p>
            <h3>Tech Stack</h3>
            <ul>
                <li><span class="tag tag-frontend">Frontend</span> React, Vite, TypeScript, Tailwind CSS, shadcn/ui</li>
                <li><span class="tag tag-backend">Backend</span> Python, FastAPI, Uvicorn</li>
                <li><span class="tag tag-db">Database</span> Oracle (XE/Standard), PL/SQL Packages</li>
            </ul>
        </section>

        <section id="frontend-setup">
            <h2>2. Frontend Setup</h2>
            <p>The frontend is located in the root <code>mtbcreditcard</code> directory.</p>
            <h3>Prerequisites</h3>
            <ul>
                <li>Node.js (v18+)</li>
                <li>npm or bun</li>
            </ul>
            <h3>Installation</h3>
            <pre><code>cd mtbcreditcard
npm install</code></pre>
            <h3>Running Development Server</h3>
            <pre><code>npm run dev</code></pre>
            <p>By default, the application runs on <code>http://localhost:5173</code>.</p>
        </section>

        <section id="backend-setup">
            <h2>3. Backend Setup</h2>
            <p>The backend is located in the <code>backend/</code> directory.</p>
            <h3>Prerequisites</h3>
            <ul>
                <li>Python 3.10+</li>
                <li>Oracle Instant Client (for <code>oracledb</code>)</li>
            </ul>
            <h3>Installation</h3>
            <pre><code>cd backend
python -m venv venv
# Windows
.\venv\Scripts\activate
# Linux/Mac
source venv/bin/activate

pip install -e .</code></pre>
            <h3>Configuration</h3>
            <p>Create a <code>.env</code> file in the <code>backend/</code> folder:</p>
            <pre><code>DB_USER=mtb_credit
DB_PASSWORD=your_password
DB_HOST=localhost
DB_PORT=1521
DB_SERVICE_NAME=XE
JWT_SECRET_KEY=generate_a_random_string</code></pre>
            <h3>Running the Server</h3>
            <pre><code>uvicorn app.main:app --reload --port 8000</code></pre>
        </section>

        <section id="database-setup">
            <h2>4. Database Setup</h2>
            <p>The database schema and procedures are located in the <code>database/</code> directory.</p>
            <h3>Installation Order</h3>
            <ol>
                <li>Run <code>ddl/</code> scripts to create tables and sequences.</li>
                <li>Compile <code>packages/pkg_credit_card_application_spec.sql</code> (Package Specification).</li>
                <li>Compile <code>packages/pkg_credit_card_application_body.sql</code> (Package Body).</li>
                <li>Run <code>ddl/01_tables_reference.sql</code> to populate lookup data (Card types, branches, etc.).</li>
            </ol>
            <div class="important">
                <strong>Note:</strong> Most business logic resides in the <code>pkg_credit_card_application</code> package to ensure data integrity and performance.
            </div>
        </section>

        <section id="app-modes">
            <h2>5. MOCK vs REAL Mode</h2>
            <p>The frontend can run in two modes, controlled by <code>.env</code>:</p>
            <table>
                <tr>
                    <th>Mode</th>
                    <th>VITE_APP_MODE</th>
                    <th>Behavior</th>
                </tr>
                <tr>
                    <td><strong>MOCK</strong></td>
                    <td><code>MOCK</code></td>
                    <td>Uses local mock data. No backend/DB needed. Perfect for UI development.</td>
                </tr>
                <tr>
                    <td><strong>REAL</strong></td>
                    <td><code>REAL</code></td>
                    <td>Calls the FastAPI backend. Requires backend and Oracle DB to be running.</td>
                </tr>
            </table>
            <p>To switch to REAL mode, update <code>mtbcreditcard/.env</code>:</p>
            <pre><code>VITE_APP_MODE=REAL
VITE_API_BASE_URL=http://localhost:8000/api/v1</code></pre>
        </section>

        <section id="new-features">
            <h2>6. Adding New Features</h2>
            <h3>Adding a New Form Step</h3>
            <ol>
                <li>Create the UI component in <code>src/ui/application/components/steps/</code>.</li>
                <li>Wrap the component with <code>StepFormWrapper</code> for consistent layout and validation.</li>
                <li>Define the Zod validation schema in <code>src/lib/validation-schemas.ts</code>.</li>
                <li>Register the step in the main <code>ApplicationPage.tsx</code> flow.</li>
            </ol>
            <h3>Adding a New API Endpoint</h3>
            <ol>
                <li><strong>Backend:</strong> Define Pydantic models in <code>app/api/models/</code>.</li>
                <li><strong>Backend:</strong> Add the route in <code>app/api/</code> (e.g., <code>applications.py</code>).</li>
                <li><strong>Frontend:</strong> Add the API call in <code>src/api/</code> (e.g., <code>application.api.ts</code>).</li>
            </ol>
        </section>

        <section id="db-changes">
            <h2>7. Database Level Changes</h2>
            <p>When modifying the database:</p>
            <h3>1. Table Changes</h3>
            <ul>
                <li>Add the migration script to <code>database/ddl/</code>.</li>
                <li>Update the <code>README.md</code> in the database folder to reflect the change.</li>
            </ul>
            <h3>2. Procedure Changes</h3>
            <ul>
                <li>Update the package body in <code>pkg_credit_card_application_body.sql</code>.</li>
                <li>All procedures should return <code>p_status</code>, <code>p_message</code>, and <code>p_json_out</code> (CLOB).</li>
            </ul>
            <h3>3. Frontend Integration</h3>
            <ul>
                <li>If the JSON output structure changes, update the corresponding TypeScript interfaces in <code>src/types/</code>.</li>
            </ul>
        </section>

        <section id="security">
            <h2>8. Security & Best Practices</h2>
            <ul>
                <li><strong>Session Security:</strong> In REAL mode, sessions are managed via JWT. In MOCK mode, <code>localStorage</code> is used (do not use in production).</li>
                <li><strong>PII Protection:</strong> NID and Mobile numbers should be masked in logs and non-essential UI views.</li>
                <li><strong>Input Validation:</strong> Always validate on both Frontend (Zod) and Backend (Pydantic).</li>
                <li><strong>Encryption:</strong> Sensitive configuration must be stored in <code>.env</code> and never committed to version control.</li>
            </ul>
        </section>

        <section id="troubleshooting">
            <h2>9. Troubleshooting</h2>
            <h3>Frontend Port Conflicts</h3>
            <p>If port 5173 is busy, Vite will try 5174, 5175, etc. Check the terminal output for the active URL.</p>
            <h3>Oracle Connection Errors</h3>
            <p>Ensure the <code>TNS_ADMIN</code> or <code>PATH</code> is set for Oracle Instant Client. Use <code>lsnrctl status</code> to verify the listener.</p>
            <h3>Backend "Module Not Found"</h3>
            <p>Ensure you installed the package in editable mode: <code>pip install -e .</code> from the backend directory.</p>
        </section>
